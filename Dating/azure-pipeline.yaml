trigger:
- main   # Run pipeline on commits to main branch

pool:
  vmImage: 'ubuntu-latest'

stages:
# -------------------
# Stage 1: Build & Unit Test
# -------------------
- stage: Build
  jobs:
  - job: MavenBuild
    steps:
    - task: Maven@3
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'clean install'
      displayName: 'Build & Test Spring Boot App'

# -------------------
# Stage 2: SonarCloud Analysis
# -------------------
- stage: SonarCloudAnalysis
  jobs:
  - job: CodeQuality
    steps:
    - task: SonarCloudPrepare@1
      inputs:
        SonarCloud: 'SonarCloudServiceConnection'   # Name of your service connection
        organization: 'my-org'                      # SonarCloud organization key
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: 'spring-boot-app'
        cliProjectName: 'Spring Boot App'
    - task: SonarCloudAnalyze@1
    - task: SonarCloudPublish@1
      inputs:
        pollingTimeoutSec: '300'

# -------------------
# Stage 3: Container Build & Trivy Scan
# -------------------
- stage: ContainerBuild
  jobs:
  - job: DockerBuild
    steps:
    # Install Trivy
    - script: |
        sudo apt-get update
        sudo apt-get install -y wget apt-transport-https gnupg lsb-release
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
        echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install -y trivy
      displayName: 'Install Trivy'

    # Build Docker image using your Dockerfile
    - task: Docker@2
      inputs:
        command: 'build'
        containerRegistry: 'ACRServiceConnection'
        repository: 'dating-app'
        Dockerfile: '**/Dockerfile'
        tags: '$(Build.BuildId)'
      displayName: 'Build Docker Image'

    # Scan Docker image with Trivy
    - script: |
        trivy image --exit-code 1 --severity HIGH,CRITICAL myacr.azurecr.io/dating-app:$(Build.BuildId)
      displayName: 'Scan Docker Image with Trivy'

    # Push image to ACR if scan passes
    - task: Docker@2
      inputs:
        command: 'push'
        containerRegistry: 'ACRServiceConnection'
        repository: 'dating-app'
        tags: '$(Build.BuildId)'
      displayName: 'Push Docker Image to ACR'

