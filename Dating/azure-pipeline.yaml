trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

stages:
- stage: Build
  jobs:
  - job: MavenBuild
    steps:
    - task: Maven@3
      inputs:
        mavenPomFile: 'pom.xml'
        goals: 'clean install'
      displayName: 'Build & Test'

- stage: SonarQubeAnalysis
  jobs:
  - job: CodeQuality
    steps:
    - task: SonarQubePrepare@5
      inputs:
        SonarQube: 'SonarQubeServiceConnection'
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: 'spring-boot-app'
        cliProjectName: 'Spring Boot App'
    - task: SonarQubeAnalyze@5
    - task: SonarQubePublish@5
      inputs:
        pollingTimeoutSec: '300'

- stage: ContainerBuild
  jobs:
  - job: DockerBuild
    steps:
    - script: |
        docker build -t myacr.azurecr.io/spring-boot-app:$(Build.BuildId) .
        trivy image --exit-code 1 --severity HIGH,CRITICAL myacr.azurecr.io/spring-boot-app:$(Build.BuildId)
      displayName: 'Build & Scan Docker Image'
    - task: Docker@2
      inputs:
        command: 'push'
        containerRegistry: 'ACRServiceConnection'
        repository: 'spring-boot-app'
        tags: '$(Build.BuildId)'

- stage: DeployAKS
  jobs:
  - job: Deploy
    steps:
    - task: Kubernetes@1
      inputs:
        connectionType: 'Azure Resource Manager'
        azureSubscription: 'AKSServiceConnection'
        azureResourceGroup: 'myResourceGroup'
        kubernetesCluster: 'myAKSCluster'
        namespace: 'production'
        command: 'apply'
        useConfigurationFile: true
        configuration: 'manifests/deployment.yaml'
